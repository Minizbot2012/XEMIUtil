name: Build Skyrim AE

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

env:
  PRESET: "vs2026-windows-vcpkg-ae"
  PROJECT_NAME: XEMIUtil
  VCPKG_ROOT: "C:\\vcpkg"

permissions:
  actions: read
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: Update VCPKG
        run: |
          cd ${{ env.VCPKG_INSTALLATION_ROOT }}
          bootstrap-vcpkg.bat -disableMetrics
          vcpkg integrate install
      - name: Configure CMake
        run: cmake --preset ${{env.PRESET}}
      - name: Build
        run: cmake --build --preset ${{env.PRESET}}
      - name: Archive
        run: 7z a ${{ env.PROJECT_NAME }}-AE.zip ./buildae/release/*.*
      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: "Skyrim NG"
          path: |
            ./build/release/*.*
      - name: Create & Upload Release
        id: upload-release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.PROJECT_NAME }}-AE.zip
          token: ${{ secrets.GITHUB_TOKEN }}
          name: ${{ env.PROJECT_NAME }} ${{ github.ref_name }}
        if: github.ref_type == 'tag'
